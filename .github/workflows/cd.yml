name: Continuous Deployment

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create-github-release:
    name: create-github-release
    runs-on: ubuntu-latest
    steps:
      - name: Create artifacts directory
        run: mkdir artifacts
      - name: Get the release version from the tag
        if: env.VERSION == ''
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "Manual run against a tag; overriding actual tag in the environment..."
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
      - name: Validate version environment variable
        run: echo "Version being built against is version ${{ env.VERSION }}"!
      - name: Save version number to artifact
        run: echo "${{ env.VERSION }}" > artifacts/release-version
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "artifacts-version-${{ github.run_number }}"
          path: artifacts

  build-release-artifacts:
    name: build-release
    needs: [create-github-release]
    runs-on: ${{ matrix.job.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: true
      matrix:
        # prettier-ignore
        job:
          - { name: "macOS-arm64",        os: "macOS-latest",   target: "aarch64-apple-darwin",           artifact_suffix: "macos-arm64",     use-cross: true                          }
          - { name: "macOS-amd64",        os: "macOS-latest",   target: "x86_64-apple-darwin",            artifact_suffix: "macos"                                                     }
          - { name: "windows-amd64",      os: "windows-latest", target: "x86_64-pc-windows-msvc",         artifact_suffix: "windows"                                                   }
          - { name: "windows-aarch64",    os: "windows-latest", target: "aarch64-pc-windows-msvc",        artifact_suffix: "windows-aarch64", use-cross: true                          }
          - { name: "linux-gnu",          os: "ubuntu-latest",  target: "x86_64-unknown-linux-gnu",       artifact_suffix: "linux"                                                     }
          - { name: "linux-musl",         os: "ubuntu-latest",  target: "x86_64-unknown-linux-musl",      artifact_suffix: "linux-musl",      use-cross: true,                         }
          - { name: "linux-aarch64-gnu",  os: "ubuntu-latest",  target: "aarch64-unknown-linux-gnu",      artifact_suffix: "aarch64-gnu",     use-cross: true, test-bin: "--bin kdash" }
          - { name: "linux-aarch64-musl", os: "ubuntu-latest",  target: "aarch64-unknown-linux-musl",     artifact_suffix: "aarch64-musl",    use-cross: true, test-bin: "--bin kdash" }
          - { name: "linux-arm-gnu",      os: "ubuntu-latest",  target: "arm-unknown-linux-gnueabi",      artifact_suffix: "armv6-gnu",       use-cross: true, test-bin: "--bin kdash" }
          - { name: "linux-arm-musl",     os: "ubuntu-latest",  target: "arm-unknown-linux-musleabihf",   artifact_suffix: "armv6-musl",      use-cross: true, test-bin: "--bin kdash" }
          - { name: "linux-armv7-gnu",    os: "ubuntu-latest",  target: "armv7-unknown-linux-gnueabihf",  artifact_suffix: "armv7-gnu",       use-cross: true, test-bin: "--bin kdash" }
          - { name: "linux-armv7-musl",   os: "ubuntu-latest",  target: "armv7-unknown-linux-musleabihf", artifact_suffix: "armv7-musl",      use-cross: true, test-bin: "--bin kdash" }
        rust: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/cache@v3
        name: Cache Cargo registry
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
      - uses: actions/cache@v3
        if: startsWith(matrix.job.name, 'linux-')
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('.github/workflows/cd.yml') }}
      - name: Get shared artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-version-${{ github.run_number }}"
          path: artifacts
      - name: Set release version
        shell: bash
        run: |
          release_version="$(cat ./artifacts/release-version)"
          echo "RELEASE_VERSION=$release_version" >> $GITHUB_ENV
      - name: Validate release environment variables
        run: |
          echo "Release version: ${{ env.RELEASE_VERSION }}"
      - uses: dtolnay/rust-toolchain@stable
        name: Set Rust toolchain
        with:
          targets: ${{ matrix.job.target }}
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          # NB: sets CARGO_BUILD_TARGET evar - do not need --target flag in build
          target: ${{ matrix.job.target }}
      - uses: taiki-e/install-action@cross
        if: ${{ matrix.job.use-cross }}

      - name: Installing needed Ubuntu dependencies
        if: matrix.job.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get -y update
          case ${{ matrix.job.target }} in
            arm*-linux-*) sudo apt-get -y install gcc-arm-linux-gnueabihf ;;
            aarch64-*-linux-*) sudo apt-get -y install gcc-aarch64-linux-gnu ;;
          esac

      - name: Build
        run: cargo build --release --verbose --target=${{ matrix.job.target }} --locked
      - name: Verify file
        shell: bash
        run: |
          file target/${{ matrix.job.target }}/release/kdash
      - name: Test
        if: matrix.job.target != 'aarch64-apple-darwin' && matrix.job.target != 'aarch64-pc-windows-msvc'
        run: cargo test --release --verbose --target=${{ matrix.job.target }} ${{ matrix.job.test-bin }}

      - name: Packaging final binary (Windows)
        if: matrix.job.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.job.target }}/release
          BINARY_NAME=kdash.exe
          if [ "${{ matrix.job.target }}" != "aarch64-pc-windows-msvc" ]; then
            # strip the binary
            strip $BINARY_NAME
          fi
          RELEASE_NAME=kdash-${{ matrix.job.artifact_suffix }}
          tar czvf $RELEASE_NAME.tar.gz $BINARY_NAME
          # create sha checksum files
          certutil -hashfile $RELEASE_NAME.tar.gz sha256 | grep -E [A-Fa-f0-9]{64} > $RELEASE_NAME.sha256
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Packaging final binary (macOS and Linux)
        if: matrix.job.os != 'windows-latest'
        shell: bash
        run: |
          # set the right strip executable
          STRIP="strip"; 
          case ${{ matrix.job.target }} in 
            arm*-linux-*) STRIP="arm-linux-gnueabihf-strip" ;; 
            aarch64-*-linux-*) STRIP="aarch64-linux-gnu-strip" ;;
          esac;
          cd target/${{ matrix.job.target }}/release
          BINARY_NAME=kdash
          # strip the binary
          "$STRIP" "$BINARY_NAME"
          RELEASE_NAME=kdash-${{ matrix.job.artifact_suffix }}
          tar czvf $RELEASE_NAME.tar.gz $BINARY_NAME
          # create sha checksum files
          shasum -a 256 $RELEASE_NAME.tar.gz > $RELEASE_NAME.sha256
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Releasing assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.job.target }}/release/${{ env.RELEASE_NAME }}.tar.gz
            target/${{ matrix.job.target }}/release/${{ env.RELEASE_NAME }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add SHA to artifacts
        run: |
          cp target/${{ matrix.job.target }}/release/${{ env.RELEASE_NAME }}.sha256 artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "artifacts-${{ github.run_number }}-${{ matrix.job.artifact_suffix }}"
          path: artifacts

  publish-homebrew-formula:
    needs: [build-release-artifacts]
    name: Update Homebrew formulas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get release artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-macos"
          path: artifacts
      - uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-macos-arm64"
          path: artifacts
      - uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-linux-musl"
          path: artifacts
      - name: Get version artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-version-${{ github.run_number }}"
          path: artifacts

      - name: Set release assets and version
        shell: bash
        run: |
          macos_sha="$(cat ./artifacts/kdash-macos.sha256 | awk '{print $1}')"
          echo "MACOS_SHA=$macos_sha" >> $GITHUB_ENV
          macos_sha_arm="$(cat ./artifacts/kdash-macos-arm64.sha256 | awk '{print $1}')"
          echo "MACOS_SHA_ARM=$macos_sha_arm" >> $GITHUB_ENV
          linux_sha="$(cat ./artifacts/kdash-linux-musl.sha256 | awk '{print $1}')"
          echo "LINUX_SHA=$linux_sha" >> $GITHUB_ENV          
          release_version="$(cat ./artifacts/release-version)"
          echo "RELEASE_VERSION=$release_version" >> $GITHUB_ENV

      - name: Validate release environment variables
        run: |
          echo "Release SHA macos: ${{ env.MACOS_SHA }}"
          echo "Release SHA macos-arm: ${{ env.MACOS_SHA_ARM }}"
          echo "Release SHA linux musl: ${{ env.LINUX_SHA }}"
          echo "Release version: ${{ env.RELEASE_VERSION }}"

      - name: Execute Homebrew packaging script
        run: |
          # run packaging script
          python "./deployment/homebrew/packager.py" ${{ env.RELEASE_VERSION }} "./deployment/homebrew/kdash.rb.template" "./kdash.rb" ${{ env.MACOS_SHA }} ${{ env.MACOS_SHA_ARM }} ${{ env.LINUX_SHA }}

          # push to Git
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone https://deepu105:${{ secrets.KDASH_RS_GITHUB_TOKEN }}@github.com/kdash-rs/homebrew-kdash.git --branch=main brew
          rm brew/Formula/kdash.rb
          cp kdash.rb brew/Formula
          cd brew
          git add .
          git diff-index --quiet HEAD || git commit -am "Update formula for KDash release ${{ env.RELEASE_VERSION }}"
          git push origin main

  publish-windows-packages:
    needs: [build-release-artifacts]
    name: Update scoop & choco formulas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get release artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-windows"
          path: artifacts

      - name: Get version artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-version-${{ github.run_number }}"
          path: artifacts

      - name: Set release assets and version
        shell: bash
        run: |
          windows_sha="$(cat ./artifacts/kdash-windows.sha256 | awk '{print $1}')"
          echo "WINDOWS_SHA=$windows_sha" >> $GITHUB_ENV
          release_version="$(cat ./artifacts/release-version)"
          echo "RELEASE_VERSION=$release_version" >> $GITHUB_ENV

      - name: Validate release environment variables
        run: |
          echo "Release SHA windows: ${{ env.WINDOWS_SHA }}"
          echo "Release version: ${{ env.RELEASE_VERSION }}"

      - name: Execute chocolatey packaging script
        run: |
          # run packaging script
          python "./deployment/chocolatey/packager.py" ${{ env.RELEASE_VERSION }} "./deployment/chocolatey/kdash.nuspec.template" "./kdash.nuspec" ${{ env.WINDOWS_SHA }}
          python "./deployment/chocolatey/packager.py" ${{ env.RELEASE_VERSION }} "./deployment/chocolatey/chocolateyinstall.ps1.template" "./chocolateyinstall.ps1" ${{ env.WINDOWS_SHA }}

          # push to Git
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone https://deepu105:${{ secrets.KDASH_RS_GITHUB_TOKEN }}@github.com/kdash-rs/choco-kdash --branch=main choco
          rm choco/kdash.nuspec
          rm choco/tools/chocolateyinstall.ps1
          cp kdash.nuspec choco/kdash.nuspec
          cp chocolateyinstall.ps1 choco/tools/chocolateyinstall.ps1
          cd choco
          git add .
          git diff-index --quiet HEAD || git commit -am "Update package for KDash release ${{ env.RELEASE_VERSION }}"
          git push origin main

      - name: Execute Scoop packaging script
        run: |
          # run packaging script
          python "./deployment/scoop/packager.py" ${{ env.RELEASE_VERSION }} "./deployment/scoop/kdash.json.template" "./kdash.json" ${{ env.WINDOWS_SHA }}

          # push to Git
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone https://deepu105:${{ secrets.KDASH_RS_GITHUB_TOKEN }}@github.com/kdash-rs/scoop-kdash --branch=main scoop
          rm scoop/kdash.json
          cp kdash.json scoop/kdash.json
          cd scoop
          git add .
          git diff-index --quiet HEAD || git commit -am "Update package for KDash release ${{ env.RELEASE_VERSION }}"
          git push origin main

  publish-docker-image:
    needs: [build-release-artifacts]
    name: Publishing Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Get version artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-version-${{ github.run_number }}"
          path: artifacts

      - name: Set release version
        shell: bash
        run: |
          release_version="$(cat ./artifacts/release-version)"
          echo "RELEASE_VERSION=$release_version" >> $GITHUB_ENV

      - name: Validate release environment variables
        run: |
          echo "Release version: ${{ env.RELEASE_VERSION }}"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          tags: deepu105/kdash:latest, deepu105/kdash:${{ env.RELEASE_VERSION }}
          push: true

  publish-cargo:
    name: Publishing to Cargo
    needs: [build-release-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        name: Cache Cargo registry
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('.github/workflows/cd.yml') }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_API_KEY }} --allow-dirty

  publish-install-scripts:
    needs: [build-release-artifacts]
    name: Upload install scripts to the release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Generate checksums for the install scripts
        shell: bash
        run: |
          cd scripts
          shasum -a 256 install.sh > install.sh.sha256
          shasum -a 256 install.ps1 > install.ps1.sha256
      - name: Upload install scripts to the release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scripts/install.sh
            scripts/install.sh.sha256
            scripts/install.ps1
            scripts/install.ps1.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # AUR publishing.
  #
  # Prerequisites (one-time setup, not handled by this workflow):
  #   1. Create the three AUR repos owned by the maintainer account:
  #        ssh://aur@aur.archlinux.org/kdash.git       (source)
  #        ssh://aur@aur.archlinux.org/kdash-bin.git   (prebuilt)
  #        ssh://aur@aur.archlinux.org/kdash-git.git   (git main)
  #   2. Add an `AUR_SSH_KEY` repo secret holding the private SSH key whose
  #      public half is registered on the AUR account.
  #
  # These jobs are skipped for pre-release tags (e.g. v2.0.0-rc1) because an
  # AUR `pkgver` cannot contain `-`; packager.py rejects them as a second guard.
  # ---------------------------------------------------------------------------

  publish-aur-source:
    needs: [build-release-artifacts]
    name: Publish AUR (source)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Compute source-tarball SHA-256
        id: shasum
        shell: bash
        run: |
          set -euo pipefail
          # GitHub auto-generates the source tarball from the tag on push.
          sha=$(curl -fsSL "https://github.com/kdash-rs/kdash/archive/refs/tags/${RELEASE_VERSION}.tar.gz" | sha256sum | awk '{print $1}')
          if ! printf '%s' "$sha" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::source tarball sha-256 did not match expected shape: $sha"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Run AUR packager unit tests
        run: python3 deployment/aur/packager_test.py
      - name: Render PKGBUILD
        env:
          SHA_SOURCE: ${{ steps.shasum.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py kdash \
            "$RELEASE_VERSION" \
            deployment/aur/kdash/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_SOURCE"
      - name: Generate .SRCINFO + namcap (archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          # makepkg refuses to run as root, so provision a build user and hand
          # it the bind-mount. namcap warnings are advisory (|| true).
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '
      - name: Install AUR SSH key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
      - name: Clone + push aur/kdash
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone ssh://aur@aur.archlinux.org/kdash.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur/kdash already up to date for ${RELEASE_VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump kdash to ${RELEASE_VERSION}"
          for attempt in 1 2 3; do
            if git push origin master; then exit 0; fi
            echo "push attempt ${attempt} failed; rebasing and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (kdash) failed after 3 attempts"
          exit 1

  publish-aur-bin:
    needs: [build-release-artifacts]
    name: Publish AUR (bin)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get x86_64 gnu sha artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-linux"
          path: artifacts
      - name: Get aarch64 gnu sha artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: "artifacts-${{ github.run_number }}-aarch64-gnu"
          path: artifacts
      - name: Extract per-arch sha256s
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          sha_x86="$(awk '{print $1; exit}' artifacts/kdash-linux.sha256)"
          sha_arm="$(awk '{print $1; exit}' artifacts/kdash-aarch64-gnu.sha256)"
          echo "sha_x86=$sha_x86" >> "$GITHUB_OUTPUT"
          echo "sha_arm=$sha_arm" >> "$GITHUB_OUTPUT"
      - name: Render PKGBUILD
        env:
          SHA_X86: ${{ steps.shas.outputs.sha_x86 }}
          SHA_ARM: ${{ steps.shas.outputs.sha_arm }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py kdash-bin \
            "$RELEASE_VERSION" \
            deployment/aur/kdash-bin/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_X86" \
            "$SHA_ARM"
      - name: Generate .SRCINFO + namcap (archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '
      - name: Install AUR SSH key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
      - name: Clone + push aur/kdash-bin
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone ssh://aur@aur.archlinux.org/kdash-bin.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur/kdash-bin already up to date for ${RELEASE_VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump kdash-bin to ${RELEASE_VERSION}"
          for attempt in 1 2 3; do
            if git push origin master; then exit 0; fi
            echo "push attempt ${attempt} failed; rebasing and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (kdash-bin) failed after 3 attempts"
          exit 1

  publish-aur-git:
    needs: [build-release-artifacts]
    name: Publish AUR (git)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Stage PKGBUILD + generate .SRCINFO (archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          cp deployment/aur/kdash-git/PKGBUILD stage/PKGBUILD
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '
      - name: Install AUR SSH key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
      - name: Clone + push aur/kdash-git (no-op if unchanged)
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone ssh://aur@aur.archlinux.org/kdash-git.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur/kdash-git already up to date; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): refresh kdash-git PKGBUILD"
          for attempt in 1 2 3; do
            if git push origin master; then exit 0; fi
            echo "push attempt ${attempt} failed; rebasing and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (kdash-git) failed after 3 attempts"
          exit 1

  publish-site:
    needs: [build-release-artifacts]
    name: Mirror install scripts to the website
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - name: Mirror install scripts + bump version.ts on the site
        shell: bash
        run: |
          set -euo pipefail
          released_at=$(date -u +%Y-%m-%d)
          version="${RELEASE_TAG#v}"

          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone https://deepu105:${{ secrets.KDASH_RS_GITHUB_TOKEN }}@github.com/kdash-rs/kdash-rs.github.io.git --branch=main site

          # Prepend a provenance header to each script, then RECOMPUTE its
          # sidecar so `curl https://kdash.cli.rs/install.sh.sha256 | shasum -c`
          # matches the served (header-prefixed) file. '#' is a line comment in
          # both sh and PowerShell, so the same header works for install.ps1.
          for s in install.sh install.ps1; do
            {
              printf '# Source: github.com/kdash-rs/kdash@%s/scripts/%s\n' "$RELEASE_TAG" "$s"
              printf '# SHA-256 verified by .github/workflows/cd.yml on %s.\n' "$released_at"
              cat "scripts/$s"
            } > "site/public/$s"
          done
          chmod +x site/public/install.sh
          ( cd site/public && shasum -a 256 install.sh > install.sh.sha256 && shasum -a 256 install.ps1 > install.ps1.sha256 )

          # Bump the site version data.
          cat > site/src/data/version.ts <<'TS_EOF'
          // Bumped on every release by .github/workflows/cd.yml in the main repo.
          // Do not edit by hand.

          export const VERSION = "__VERSION__";
          export const TAG = "__TAG__";
          export const RELEASED_AT = "__RELEASED_AT__";
          TS_EOF
          sed -i \
            -e "s|__VERSION__|${version}|g" \
            -e "s|__TAG__|${RELEASE_TAG}|g" \
            -e "s|__RELEASED_AT__|${released_at}|g" \
            site/src/data/version.ts

          cd site
          git add public/install.sh public/install.sh.sha256 public/install.ps1 public/install.ps1.sha256 src/data/version.ts
          if git diff-index --quiet HEAD; then
            echo "site already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): mirror install scripts for ${RELEASE_TAG}"
          for attempt in 1 2 3; do
            if git push origin main; then exit 0; fi
            echo "push attempt ${attempt} failed; rebasing and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::site push failed after 3 attempts"
          exit 1
