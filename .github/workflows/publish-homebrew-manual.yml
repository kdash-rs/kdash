name: publish-homebrew-manual

# Manually re-render and push the Homebrew formula for an existing GitHub
# Release. Mirrors the publish-homebrew-formula job in cd.yml, but reads the
# per-target SHA-256 sidecars from the already-published release assets instead
# of build artifacts. Use to update homebrew-kdash for a past release (e.g.
# v2.0.0) without re-running the whole release.

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing GH Release tag to publish (e.g. v2.0.0)"
        required: true
        type: string
      template-ref:
        description: "Repo ref for the template + packager (default: main)"
        required: false
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: publish-homebrew-manual-${{ inputs.release-tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.release-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.template-ref }}
          fetch-depth: 1

      - name: Download SHA-256 sidecars from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$RELEASE_VERSION" --dir shas \
            --pattern 'kdash-macos.sha256' \
            --pattern 'kdash-macos-arm64.sha256' \
            --pattern 'kdash-linux-musl.sha256'

      - name: Set release assets and version
        shell: bash
        run: |
          set -euo pipefail
          echo "MACOS_SHA=$(awk '{print $1; exit}' shas/kdash-macos.sha256)" >> "$GITHUB_ENV"
          echo "MACOS_SHA_ARM=$(awk '{print $1; exit}' shas/kdash-macos-arm64.sha256)" >> "$GITHUB_ENV"
          echo "LINUX_SHA=$(awk '{print $1; exit}' shas/kdash-linux-musl.sha256)" >> "$GITHUB_ENV"

      - name: Execute Homebrew packaging script
        run: |
          python3 "./deployment/homebrew/packager.py" ${{ env.RELEASE_VERSION }} "./deployment/homebrew/kdash.rb.template" "./kdash.rb" ${{ env.MACOS_SHA }} ${{ env.MACOS_SHA_ARM }} ${{ env.LINUX_SHA }}

          git config --global user.email "d4udts@gmail.com"
          git config --global user.name "deepu105"
          git clone https://deepu105:${{ secrets.KDASH_RS_GITHUB_TOKEN }}@github.com/kdash-rs/homebrew-kdash.git --branch=main brew
          rm brew/Formula/kdash.rb
          cp kdash.rb brew/Formula
          cd brew
          git add .
          git diff-index --quiet HEAD || git commit -am "Update formula for KDash release ${{ env.RELEASE_VERSION }}"
          git push origin main
